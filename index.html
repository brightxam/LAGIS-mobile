<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAGIS 2026</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
</head>
<body>

  <div id="map"></div>

  <div id="topbar">
    <div id="logo-pill">
      <div id="logo-icon">L</div>
      <span id="logo-text">LAGIS</span>
    </div>
    <div id="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search Yaba..." autocomplete="off" />
      <button id="search-clear" class="hidden">x</button>
    </div>
    <button id="locate-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg>
    </button>
  </div>

  <div id="cat-pills">
    <button class="pill active" data-cat="all">All</button>
    <button class="pill" data-cat="food">Food</button>
    <button class="pill" data-cat="bank">Banks</button>
    <button class="pill" data-cat="health">Health</button>
    <button class="pill" data-cat="market">Markets</button>
    <button class="pill" data-cat="school">Schools</button>
    <button class="pill" data-cat="tech">Tech</button>
    <button class="pill" data-cat="fuel">Fuel</button>
    <button class="pill" data-cat="transit">Transit</button>
    <button class="pill" data-cat="cinema">Cinema</button>
  </div>

  <div id="bottom-sheet">
    <div id="sheet-handle-wrap">
      <div id="sheet-handle"></div>
    </div>
    <div id="sheet-header">
      <span id="list-count">0 places</span>
      <span id="sheet-area">Yaba, Lagos</span>
    </div>
    <div id="poi-list"></div>
  </div>

  <div id="poi-card" class="hidden">
    <div id="card-handle-wrap"><div id="card-handle"></div></div>
    <div id="card-inner">
      <div id="card-top">
        <div id="card-left">
          <div id="card-badge"></div>
          <h2 id="card-name"></h2>
          <p id="card-address"></p>
        </div>
        <button id="card-close">x</button>
      </div>
      <div id="card-meta">
        <div class="meta-row hidden" id="meta-phone"><span>phone</span><span id="meta-phone-text"></span></div>
        <div class="meta-row hidden" id="meta-hours"><span>hours</span><span id="meta-hours-text"></span></div>
      </div>
      <div id="card-btns"></div>
    </div>
  </div>

  <div id="zoom-controls">
    <button id="zoom-in">+</button>
    <div class="zoom-divider"></div>
    <button id="zoom-out">-</button>
  </div>

  <div id="route-panel" class="hidden">
    <div id="route-header">
      <button id="route-close">x</button>
      <span id="route-title">Get Directions</span>
      <button id="route-swap">swap</button>
    </div>
    <div id="route-inputs">
      <div class="route-input-row">
        <div class="route-dot" style="background:#1a7a4a;"></div>
        <input type="text" id="route-from" placeholder="Your location or type address..." />
        <button id="btn-use-location">locate</button>
      </div>
      <div class="route-line"></div>
      <div class="route-input-row">
        <div class="route-dot" style="background:#f97316;"></div>
        <input type="text" id="route-to" placeholder="Destination..." />
        <button id="btn-clear-to">x</button>
      </div>
    </div>
    <div id="route-modes">
      <button class="mode-btn active" data-mode="driving">Drive</button>
      <button class="mode-btn" data-mode="walking">Walk</button>
      <button class="mode-btn" data-mode="cycling">Cycle</button>
    </div>
    <button id="btn-get-route">Get Route</button>
    <div id="route-info" class="hidden">
      <div id="route-distance">-</div>
      <div id="route-time">-</div>
    </div>
    <div id="route-suggestions">
      <div id="route-suggestions-title">Nearby along route</div>
      <div id="route-suggestions-list"></div>
    </div>
  </div>

  <div id="route-overlay" class="hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
