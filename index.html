<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LAGIS 2026</title>
  <link rel="stylesheet" href="style.css" /><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /><link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  
</head>
<body>

  <!-- FULL SCREEN MAP -->
  <div id="map"></div>

  <!-- FLOATING TOP BAR -->
  <div id="topbar">
    <div id="logo-pill">
      <div id="logo-icon">L</div>
      <span id="logo-text">LAGIS</span>
    </div>
    <div id="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search Yaba…" autocomplete="off" />
      <button id="search-clear" class="hidden">✕</button>
    </div>
    <button id="locate-btn" aria-label="My location">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg>
    </button>
  </div>

  <!-- FLOATING CATEGORY PILLS -->
  <div id="cat-pills">
    <button class="pill active" data-cat="all">🗺️ All</button>
    <button class="pill" data-cat="food">🍽️ Food</button>
    <button class="pill" data-cat="bank">🏦 Banks</button>
    <button class="pill" data-cat="health">🏥 Health</button>
    <button class="pill" data-cat="market">🛒 Markets</button>
    <button class="pill" data-cat="school">🎓 Schools</button>
    <button class="pill" data-cat="fuel">⛽ Fuel</button>
    <button class="pill" data-cat="transit">🚌 Transit</button>
  </div>

  <!-- BOTTOM SHEET -->
  <div id="bottom-sheet">
    <div id="sheet-handle-wrap">
      <div id="sheet-handle"></div>
    </div>
    <div id="sheet-header">
      <span id="list-count">15 places</span>
      <span id="sheet-area">Yaba, Lagos</span>
    </div>
    <div id="poi-list"></div>
  </div>

  <!-- POI DETAIL CARD -->
  <div id="poi-card" class="hidden">
    <div id="card-handle-wrap">
      <div id="card-handle"></div>
    </div>
    <div id="card-inner">
      <div id="card-top">
        <div id="card-left">
          <div id="card-badge"></div>
          <h2 id="card-name"></h2>
          <p id="card-address"></p>
        </div>
        <button id="card-close">✕</button>
      </div>
      <div id="card-meta">
        <div class="meta-row hidden" id="meta-phone">
          <span>📞</span><span id="meta-phone-text"></span>
        </div>
        <div class="meta-row hidden" id="meta-hours">
          <span>🕐</span><span id="meta-hours-text"></span>
        </div>
      </div>
      <div id="card-btns">
        <button class="card-action primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Directions
        </button>
        <button class="card-action">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
        <button class="card-action">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Save
        </button>
      </div>
    </div>
  </div>

  <!-- ZOOM CONTROLS -->
  <div id="zoom-controls">
    <button id="zoom-in">+</button>
    <div class="zoom-divider"></div>
    <button id="zoom-out">−</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script src="config.js"></script><script src="app.js"></script>
</body>
</html>
